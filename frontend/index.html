<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="color-scheme" content="dark" />

    <!-- Primary meta -->
    <title>Delowar's Email Verifier - Extract, Validate, and De-risk Emails at Scale</title>
    <meta
      name="description"
      content="Free, open-source email verifier and bulk extractor. Multi-format ingest (CSV / XLSX / EML / mbox), DNS + SMTP verification, country &amp; provider tagging, BYOL Lead Finder, and bulk processing up to 100,000 addresses per job."
    />
    <meta name="application-name" content="Delowar's Email Verifier" />
    <meta name="author" content="Delowar Hossain" />
    <meta
      name="keywords"
      content="email verifier, email validator, bulk email verification, smtp probe, mx record check, email extractor, lead finder, deliverability, free email verifier, open source"
    />
    <link rel="canonical" href="/" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#c3f400" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Brand typography: Space Grotesk (display) + Inter (body) + JetBrains Mono (caption / code). Aligned with delowarhossain.dev. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"

    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

      property="og:description"
      content="Free, open-source email verifier and bulk extractor. Multi-format ingest, DNS + SMTP verification, country &amp; provider tagging, BYOL Lead Finder, and bulk processing up to 100k addresses per job."

    <meta property="og:url" content="/" />
    <meta property="og:image" content="/og-image.svg" />

    <meta name="twitter:title" content="Delowar's Email Verifier" />

      name="twitter:description"
      content="Free, open-source email verifier and bulk extractor. Multi-format ingest, DNS + SMTP verification, BYOL Lead Finder."

      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"

        "name": "Delowar's Email Verifier",
        "applicationCategory": "BusinessApplication",

        "author": {
          "@type": "Person",
          "name": "Delowar Hossain",
          "url": "https://delowarhossain.dev",
