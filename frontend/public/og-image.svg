    <text x="286" y="20">DNS + SMTP</text>
    <text x="446" y="20" fill="#525252">·</text>
    <text x="472" y="20">OPEN SOURCE</text>
    <text x="654" y="20" fill="#525252">·</text>
    <text x="680" y="20">SELF-HOST READY</text>
