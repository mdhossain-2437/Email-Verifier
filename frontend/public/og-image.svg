    <path d="M12 29 L 22 39 L 45 16" fill="none" stroke="#c3f400" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="166" y="124" fill="#c3f400" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="6">SAAF · CLEAN EMAIL LISTS · FREE TIER</text>

