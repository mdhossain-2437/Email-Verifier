    <path d="M12 20 L28 32 L44 20" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="180" y="240" fill="white" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="600" letter-spacing="-1">Delowar's Email Verifier</text>
  <text x="96" y="320" fill="white" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700" letter-spacing="-2">Find every email.</text>
  <text x="96" y="400" fill="url(#accent)" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700" letter-spacing="-2">Then prove it's real.</text>
  <text x="96" y="470" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400">Extract · Validate · De-risk — at scale, for free.</text>
