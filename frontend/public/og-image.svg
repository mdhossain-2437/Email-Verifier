      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#c3f400" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c3f400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <g opacity="0.05" stroke="#ffffff" stroke-width="1" fill="none">
    <path d="M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500"/>
    <path d="M100 0 L100 630 M300 0 L300 630 M500 0 L500 630 M700 0 L700 630 M900 0 L900 630 M1100 0 L1100 630"/>
  </g>

  <g transform="translate(96 86)">
